<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 282" width="420" height="282" role="img" aria-label="Koltex Technology Stack">
<defs><style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shineX{0%{transform:translateX(-140px)}60%,100%{transform:translateX(460px)}}
@keyframes borderPulse{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.row{opacity:0;animation:fadeUp .5s ease forwards}
.sh{animation:shineX 4s ease-in-out 2.2s infinite}
.bp{animation:borderPulse 2.8s ease-in-out infinite}
.tw{transform-box:fill-box;transform-origin:center;animation:twinkle 3s ease-in-out infinite}
.fadein{opacity:0;animation:fadeIn .8s ease 2.9s forwards}
]]></style>

<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#00E5FF;#38BDF8;#67e8f9;#00E5FF" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#38BDF8;#67e8f9;#00E5FF;#38BDF8" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="cardBorder" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%"><animate attributeName="stop-color" values="#00E5FF;#38BDF8;#00E5FF" dur="5s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#38BDF8;#00E5FF;#38BDF8" dur="5s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="cardg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#131c2c" stop-opacity=".95"/><stop offset="100%" stop-color="#0a0d14" stop-opacity=".97"/>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/><stop offset="50%" stop-color="#7be3ff" stop-opacity=".22"/><stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/></linearGradient>
<radialGradient id="ambient"><stop offset="0%" stop-color="#00E5FF" stop-opacity=".10"/><stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/></radialGradient>
<pattern id="dotgrid" width="18" height="18" patternUnits="userSpaceOnUse">
  <circle cx="1" cy="1" r="1" fill="#38BDF8" opacity=".10"/>
</pattern>

<filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="barGlow" x="-40%" y="-150%" width="180%" height="400%"><feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity=".55"/></filter>
<clipPath id="cardc"><rect x="1" y="1" width="418" height="280" rx="16"/></clipPath>
<clipPath id="stackc"><rect x="20" y="44" width="0" height="3" rx="1.5"><animate attributeName="width" from="0" to="380" dur="1.2s" begin=".3s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/></rect></clipPath>
</defs>

<g filter="url(#cardShadow)">
<rect x="1" y="1" width="418" height="280" rx="16" fill="url(#cardg)"/>
<rect x="1" y="1" width="418" height="280" rx="16" fill="none" stroke="url(#cardBorder)" stroke-width="1.6" class="bp"/>
</g>

<g clip-path="url(#cardc)">
  <!-- subtle background texture -->
  <rect x="1" y="1" width="418" height="280" fill="url(#dotgrid)"/>
  <circle cx="60" cy="40" r="90" fill="url(#ambient)"/>
  <circle cx="380" cy="250" r="100" fill="url(#ambient)"/>

  <!-- faint circuitry / binary / api-node accents -->
  <g stroke="#38BDF8" stroke-width="1" fill="none" opacity=".16">
    <polyline points="352,14 386,14 386,30"/>
    <polyline points="18,258 18,238 40,238"/>
  </g>
  <g fill="#00E5FF" opacity=".35">
    <circle cx="386" cy="30" r="1.8"/>
    <circle cx="40" cy="238" r="1.8"/>
  </g>
  <g fill="#38BDF8" font-size="8" opacity=".14">
    <text x="360" y="270" class="tw" style="animation-delay:.6s">01</text>
    <text x="8" y="18" class="tw" style="animation-delay:1.6s">10</text>
  </g>
  <g fill="#00E5FF" class="tw" style="animation-delay:1s">
    <circle cx="330" cy="20" r="1.3"/>
  </g>
  <g fill="#38BDF8" class="tw" style="animation-delay:2.2s">
    <circle cx="15" cy="200" r="1.2"/>
  </g>

  <text x="20" y="24" font-size="15" font-weight="bold" fill="url(#tg)" filter="url(#glow)">&#9889; Koltex Technology Stack</text>
  <text x="20" y="36" font-size="8.5" fill="#8b949e" letter-spacing="1.6">TECHNOLOGIES WE BUILD WITH</text>

  <g clip-path="url(#stackc)"><rect x="20" y="44" width="380" height="3" fill="url(#tg)"/></g>

  <g class="row" style="animation-delay:0.55s">
    <circle cx="26" cy="64" r="4" fill="#FF2D20"/>
    <text x="40" y="68" font-size="11.5" fill="#D1D5DB" font-weight="bold" letter-spacing=".2">Laravel</text>
    <text x="396" y="68" text-anchor="end" font-size="11.5" fill="#FF2D20" font-weight="bold">95%</text>
    <rect x="40" y="73" width="268" height="6" rx="3" fill="#1a2233"/>
    <rect class="bar" x="40" y="73" width="254.6" height="6" rx="3" fill="#FF2D20" filter="url(#barGlow)" style="animation-delay:0.7s">
      <animate attributeName="width" from="0" to="254.6" dur="1s" begin="0.7s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:0.82s">
    <circle cx="26" cy="90" r="4" fill="#61DAFB"/>
    <text x="40" y="94" font-size="11.5" fill="#D1D5DB" font-weight="bold" letter-spacing=".2">React</text>
    <text x="396" y="94" text-anchor="end" font-size="11.5" fill="#61DAFB" font-weight="bold">92%</text>
    <rect x="40" y="99" width="268" height="6" rx="3" fill="#1a2233"/>
    <rect class="bar" x="40" y="99" width="246.6" height="6" rx="3" fill="#61DAFB" filter="url(#barGlow)" style="animation-delay:0.97s">
      <animate attributeName="width" from="0" to="246.6" dur="1s" begin="0.97s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.09s">
    <circle cx="26" cy="116" r="4" fill="#54C5F8"/>
    <text x="40" y="120" font-size="11.5" fill="#D1D5DB" font-weight="bold" letter-spacing=".2">Flutter</text>
    <text x="396" y="120" text-anchor="end" font-size="11.5" fill="#54C5F8" font-weight="bold">88%</text>
    <rect x="40" y="125" width="268" height="6" rx="3" fill="#1a2233"/>
    <rect class="bar" x="40" y="125" width="235.8" height="6" rx="3" fill="#54C5F8" filter="url(#barGlow)" style="animation-delay:1.24s">
      <animate attributeName="width" from="0" to="235.8" dur="1s" begin="1.24s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.36s">
    <circle cx="26" cy="142" r="4" fill="#FFFFFF"/>
    <text x="40" y="146" font-size="11.5" fill="#D1D5DB" font-weight="bold" letter-spacing=".2">Next.js</text>
    <text x="396" y="146" text-anchor="end" font-size="11.5" fill="#FFFFFF" font-weight="bold">85%</text>
    <rect x="40" y="151" width="268" height="6" rx="3" fill="#1a2233"/>
    <rect class="bar" x="40" y="151" width="227.8" height="6" rx="3" fill="#FFFFFF" filter="url(#barGlow)" style="animation-delay:1.51s">
      <animate attributeName="width" from="0" to="227.8" dur="1s" begin="1.51s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.63s">
    <circle cx="26" cy="168" r="4" fill="#68A063"/>
    <text x="40" y="172" font-size="11.5" fill="#D1D5DB" font-weight="bold" letter-spacing=".2">Node.js</text>
    <text x="396" y="172" text-anchor="end" font-size="11.5" fill="#68A063" font-weight="bold">83%</text>
    <rect x="40" y="177" width="268" height="6" rx="3" fill="#1a2233"/>
    <rect class="bar" x="40" y="177" width="222.4" height="6" rx="3" fill="#68A063" filter="url(#barGlow)" style="animation-delay:1.78s">
      <animate attributeName="width" from="0" to="222.4" dur="1s" begin="1.78s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.9s">
    <circle cx="26" cy="194" r="4" fill="#FFD43B"/>
    <text x="40" y="198" font-size="11.5" fill="#D1D5DB" font-weight="bold" letter-spacing=".2">Python</text>
    <text x="396" y="198" text-anchor="end" font-size="11.5" fill="#FFD43B" font-weight="bold">80%</text>
    <rect x="40" y="203" width="268" height="6" rx="3" fill="#1a2233"/>
    <rect class="bar" x="40" y="203" width="214.4" height="6" rx="3" fill="#FFD43B" filter="url(#barGlow)" style="animation-delay:2.05s">
      <animate attributeName="width" from="0" to="214.4" dur="1s" begin="2.05s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:2.17s">
    <circle cx="26" cy="220" r="4" fill="#00758F"/>
    <text x="40" y="224" font-size="11.5" fill="#D1D5DB" font-weight="bold" letter-spacing=".2">MySQL</text>
    <text x="396" y="224" text-anchor="end" font-size="11.5" fill="#00758F" font-weight="bold">90%</text>
    <rect x="40" y="229" width="268" height="6" rx="3" fill="#1a2233"/>
    <rect class="bar" x="40" y="229" width="241.2" height="6" rx="3" fill="#00758F" filter="url(#barGlow)" style="animation-delay:2.32s">
      <animate attributeName="width" from="0" to="241.2" dur="1s" begin="2.32s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:2.44s">
    <circle cx="26" cy="246" r="4" fill="#2496ED"/>
    <text x="40" y="250" font-size="11.5" fill="#D1D5DB" font-weight="bold" letter-spacing=".2">Docker</text>
    <text x="396" y="250" text-anchor="end" font-size="11.5" fill="#2496ED" font-weight="bold">76%</text>
    <rect x="40" y="255" width="268" height="6" rx="3" fill="#1a2233"/>
    <rect class="bar" x="40" y="255" width="203.7" height="6" rx="3" fill="#2496ED" filter="url(#barGlow)" style="animation-delay:2.59s">
      <animate attributeName="width" from="0" to="203.7" dur="1s" begin="2.59s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>

  <text x="210" y="274" text-anchor="middle" font-size="7.5" letter-spacing="1.4" fill="#D1D5DB" opacity=".55" class="fadein">KOLTEX TECHNOLOGIES &#183; PREMIUM SOFTWARE AGENCY</text>

  <rect class="sh" x="0" y="0" width="90" height="282" fill="url(#shg)" transform="skewX(-15)"/>
</g>
</svg>
